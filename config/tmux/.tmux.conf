
# Set the default terminal mode to 256color mode
set -g default-terminal "screen-256color"

# Enable vi mode
setw -g mode-keys vi
set-window-option -g mode-keys vi 

# hjkl navigation between pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# HJKL for resizing panes
bind H resize-pane -L
bind J resize-pane -D
bind K resize-pane -U
bind L resize-pane -R


# copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'

# enable activity alerts
setw -g monitor-activity on
set -g visual-activity on

# changing prefix from 'Ctrl+b' to 'Alt+b'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# reload config on prefix + r 
bind r source-file ~/.tmux.conf

# windows start at 1 instead of 0
set -g base-index 1

# put useful info in the status bar
set-option -g set-titles on
set-option -g set-titles-string '#H:#S.#I.#P #W #T' # window number,program name, active(or not)


# layout
set -g status-justify centre

# colors
set -g status-style bg=colour0,fg=colour255

# clock mode
setw -g clock-mode-colour colour255

# right status
set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,} %H:%M %d-%m-%Y"

set -g status-bg colour0 

# icons

# plugins


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'


run '~/.tmux/plugins/tpm/tpm'
