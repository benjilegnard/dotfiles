---
- name: Install GUI tools
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - xournal
    - gimp
    - rhythmbox
    - shotwell
    - openscad
    - inkscape
    - pavucontrol
    - thunar
    - thunar-archive-plugin
    - thunar-media-tags-plugin

- name: Remove GUI tools
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
  loop:
    - krita
    - foot

- name: Add mozillateam repository
  ansible.builtin.apt_repository:
    repo: "ppa:mozillateam/firefox-next"
    filename: "mozillateam-firefox-next"
    state: present

- name: Install Firefox
  ansible.builtin.apt:
    name: firefox
    state: present
