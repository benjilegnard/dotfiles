---
- name: Install git
  ansible.builtin.apt:
    name:
      - git
    state: present

- name: Copy git config directory
  ansible.builtin.copy:
    src: ./config/git/.gitconfig
    dest: /home/{{ user }}/.gitconfig
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "644"

