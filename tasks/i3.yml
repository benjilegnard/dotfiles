---
# i3, a tiling manager.
- name: Install i3 and related packages
  become: true
  ansible.builtin.apt:
    name:
      - i3
      - rofi
      - xorg
      - feh
      - arandr
    install_recommends: true
    state: present

- name: Ensure config directories exists
  ansible.builtin.file:
    path: /home/{{ user }}/.config/{{ item }}/
    recurse: true
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "755"
  loop:
    - i3
    - rofi

- name: Copy configuration files for rofi
  ansible.builtin.copy:
    src: ./config/rofi/{{ item }}
    dest: /home/{{ user }}/.config/rofi/
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "755"
  loop:
    - config
    - style.css
    - wofi-emoji

- name: Copy configuration files for i3
  ansible.builtin.copy:
    src: ./config/sway/{{ item }}
    dest: /home/{{ user }}/.config/i3/
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "755"
